<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Commande confirmée · StyleShop Nordexx</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }
        body { background: #f8f6f2; color: #1e1e1e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .card { background: white; max-width: 480px; width: 100%; padding: 2.5rem; border-radius: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); text-align: center; }
        .icon { font-size: 3rem; margin-bottom: 0.5rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #5e5546; line-height: 1.6; margin-bottom: 0.5rem; }
        .order-ref { font-size: 0.85rem; color: #8a7d6a; margin: 1rem 0; word-break: break-all; }
        .btn { display: inline-block; margin-top: 1.5rem; padding: 0.8rem 2rem; background: #1e1e1e; color: white; border-radius: 60px; text-decoration: none; font-weight: 600; }
        .btn:hover { background: #3f3a32; }
        .error { color: #b33a2e; }
        .loading { color: #7a6f5d; }
    </style>
</head>
<body>
    <div class="card" id="content">
        <div class="icon">⏳</div>
        <h1>Vérification de votre commande…</h1>
        <p class="loading">Merci de patienter un instant.</p>
    </div>

    <!-- GA4 (même ID que le site principal, à garder synchronisé) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HXSZCHYD64"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-HXSZCHYD64', { send_page_view: false });

        (async function () {
            const params = new URLSearchParams(window.location.search);
            const sessionId = params.get('session_id');
            const content = document.getElementById('content');

            if (!sessionId) {
                content.innerHTML = `
                    <div class="icon">⚠️</div>
                    <h1 class="error">Session introuvable</h1>
                    <p>Impossible de retrouver votre commande. Si le prélèvement a bien eu lieu, contactez-nous avec votre reçu bancaire.</p>
                    <a class="btn" href="/">Retour à la boutique</a>
                `;
                return;
            }

            try {
                const res = await fetch(`/api/verify-session?session_id=${encodeURIComponent(sessionId)}`);
                const data = await res.json();

                if (!data.paid) {
                    content.innerHTML = `
                        <div class="icon">⚠️</div>
                        <h1 class="error">Paiement non confirmé</h1>
                        <p>Le paiement n'a pas pu être confirmé. Aucun montant n'a été débité pour cette tentative.</p>
                        <a class="btn" href="/">Retour à la boutique</a>
                    `;
                    return;
                }

                // Tracking GA4 purchase — uniquement une fois le paiement confirmé côté serveur
                gtag('event', 'purchase', {
                    transaction_id: data.transaction_id,
                    value: data.total,
                    currency: (data.currency || 'eur').toUpperCase(),
                    shipping: data.shipping || 0,
                    items: data.items.map(it => ({
                        item_name: it.name,
                        price: it.price,
                        quantity: it.quantity
                    }))
                });

                // Vider le panier local — la commande est passée
                try { localStorage.removeItem('nordexx_cart'); } catch (e) {}

                content.innerHTML = `
                    <div class="icon">✅</div>
                    <h1>Merci pour votre commande !</h1>
                    <p>Votre paiement de <strong>${data.total.toFixed(2)} €</strong> a bien été confirmé.</p>
                    ${data.customer_email ? `<p>Un e-mail de confirmation a été envoyé à ${data.customer_email}.</p>` : ''}
                    <div class="order-ref">Référence : ${data.transaction_id}</div>
                    <a class="btn" href="/">Continuer mes achats</a>
                `;
            } catch (err) {
                content.innerHTML = `
                    <div class="icon">⚠️</div>
                    <h1 class="error">Erreur de vérification</h1>
                    <p>Une erreur technique empêche la confirmation immédiate. Conservez votre reçu bancaire par précaution.</p>
                    <a class="btn" href="/">Retour à la boutique</a>
                `;
            }
        })();
    </script>
</body>
</html>
