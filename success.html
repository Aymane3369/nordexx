<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✅ Paiement réussi - StyleShop/Nordexx</title>
    
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HXSZCHYD64"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-HXSZCHYD64');
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f8f6f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
            margin: 0;
        }
        .success-box {
            background: white;
            padding: 3rem 2rem;
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .check {
            font-size: 64px;
            color: #2d7a4a;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-size: 1.8rem;
            color: #1e1e1e;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #5e5546;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }
        .order-id {
            background: #f8f6f2;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            font-size: 0.95rem;
            color: #1e1e1e;
        }
        .order-id strong {
            font-weight: 700;
            color: #1e1e1e;
            letter-spacing: 1px;
        }
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }
        .features .feat {
            background: #f8f6f2;
            padding: 1rem 0.8rem;
            border-radius: 16px;
            transition: transform 0.2s;
        }
        .features .feat:hover {
            transform: translateY(-2px);
        }
        .features .feat i {
            font-size: 1.8rem;
            color: #1e1e1e;
            margin-bottom: 0.3rem;
            display: block;
        }
        .features .feat span {
            font-size: 0.8rem;
            color: #5e5546;
            font-weight: 500;
        }
        .btn {
            display: inline-block;
            padding: 0.8rem 2.5rem;
            background: #1e1e1e;
            color: white;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            margin-top: 0.5rem;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #3f3a32;
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .btn-outline {
            background: transparent;
            color: #1e1e1e;
            border: 2px solid #e8e2d6;
            margin-left: 0.5rem;
        }
        .btn-outline:hover {
            background: #f8f6f2;
            transform: scale(1.02);
        }
        .btn-group {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .btn-group .btn {
            flex: 1;
            min-width: 140px;
        }
        .social-share {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e8e2d6;
        }
        .social-share p {
            color: #7a6f5d;
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }
        .social-share .share-btns {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .social-share .share-btns a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.2s;
            color: white;
        }
        .social-share .share-btns a:hover { transform: scale(1.05); }
        .share-wa { background: #25D366; }
        .share-fb { background: #1877F2; }
        .share-tw { background: #000000; }
        .share-email { background: #1e1e1e; }
        .social-share .share-btns a i { font-size: 1rem; }

        @media (max-width: 480px) {
            .success-box { padding: 2rem 1.5rem; }
            .features { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
            .features .feat { padding: 0.8rem 0.5rem; }
            .features .feat i { font-size: 1.4rem; }
            .btn-group { flex-direction: column; }
            .btn-group .btn { min-width: auto; }
            .social-share .share-btns a { padding: 0.3rem 0.8rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="success-box">
        <div class="check">✅</div>
        <h1>🎉 Commande confirmée !</h1>
        <p class="subtitle">Votre paiement a été accepté avec succès.<br>Un email de confirmation vous a été envoyé.</p>

        <div class="order-id">
            📦 Numéro de commande : <strong id="orderId">...</strong>
        </div>

        <div class="features">
            <div class="feat">
                <i class="fas fa-truck"></i>
                <span>Livraison 24h</span>
            </div>
            <div class="feat">
                <i class="fas fa-shield-alt"></i>
                <span>Garantie 2 ans</span>
            </div>
            <div class="feat">
                <i class="fas fa-undo-alt"></i>
                <span>Retour 30 jours</span>
            </div>
            <div class="feat">
                <i class="fas fa-headset"></i>
                <span>Support 7j/7</span>
            </div>
        </div>

        <div class="btn-group">
            <a href="/" class="btn"><i class="fas fa-arrow-left"></i> Continuer</a>
            <a href="/" class="btn btn-outline"><i class="fas fa-shopping-bag"></i> Voir les produits</a>
        </div>

        <div class="social-share">
            <p>✨ Partagez votre achat avec vos amis !</p>
            <div class="share-btns">
                <a href="#" class="share-wa" onclick="shareOrder('whatsapp')">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
                <a href="#" class="share-fb" onclick="shareOrder('facebook')">
                    <i class="fab fa-facebook-f"></i> Facebook
                </a>
                <a href="#" class="share-tw" onclick="shareOrder('twitter')">
                    <i class="fab fa-x-twitter"></i> X
                </a>
                <a href="#" class="share-email" onclick="shareOrder('email')">
                    <i class="fas fa-envelope"></i> Email
                </a>
            </div>
        </div>
    </div>

    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script>
        // ============================================================
        //  RÉCUPÉRATION DE L'ID DE COMMANDE
        // ============================================================
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id');
        const orderIdEl = document.getElementById('orderId');
        
        if (sessionId) {
            // Afficher l'ID de commande
            orderIdEl.textContent = sessionId.slice(-8).toUpperCase();
            
            // Vider le panier
            try {
                localStorage.removeItem('nordexx_cart');
                console.log('🗑️ Panier vidé');
            } catch (e) {
                console.warn('Erreur vidage panier:', e);
            }
            
            // Tracker la conversion GA4
            if (typeof gtag !== 'undefined') {
                gtag('event', 'purchase', {
                    transaction_id: sessionId,
                    value: 0,
                    currency: 'EUR'
                });
                console.log('📊 Purchase event envoyé à GA4');
            }
        } else {
            orderIdEl.textContent = 'Généré automatiquement';
        }

        // ============================================================
        //  FONCTION DE PARTAGE
        // ============================================================
        function shareOrder(platform) {
            const url = window.location.origin;
            const text = `🎉 Je viens d'acheter sur StyleShop/Nordexx ! Découvrez leur collection premium : ${url}`;
            
            let shareUrl = '';
            
            switch(platform) {
                case 'whatsapp':
                    shareUrl = `https://wa.me/?text=${encodeURIComponent(text)}`;
                    break;
                case 'facebook':
                    shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(text)}`;
                    break;
                case 'twitter':
                    shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
                    break;
                case 'email':
                    shareUrl = `mailto:?subject=StyleShop/Nordexx&body=${encodeURIComponent(text)}`;
                    break;
                default:
                    // Utiliser l'API Web Share si disponible
                    if (navigator.share) {
                        navigator.share({
                            title: 'StyleShop/Nordexx',
                            text: text,
                            url: url
                        }).catch(() => {});
                        return;
                    }
                    // Fallback copie
                    if (navigator.clipboard) {
                        navigator.clipboard.writeText(text).then(() => {
                            alert('📋 Lien copié dans le presse-papier !');
                        });
                    }
                    return;
            }
            
            if (shareUrl) {
                window.open(shareUrl, '_blank', 'width=600,height=400');
            }
            
            // Tracking du partage
            if (typeof gtag !== 'undefined') {
                gtag('event', 'share', {
                    method: platform,
                    content_type: 'order_confirmation'
                });
            }
        }

        // Exposer la fonction globalement
        window.shareOrder = shareOrder;

        // ============================================================
        //  CONSOLE LOG
        // ============================================================
        console.log('✅ Page de confirmation de commande');
        console.log('📦 Commande:', sessionId || 'Inconnue');
        console.log('🔄 Redirection vers l\'accueil dans 10s...');
        
        // Redirection automatique après 10 secondes
        setTimeout(() => {
            window.location.href = '/';
        }, 10000);
    </script>

</body>
</html>
